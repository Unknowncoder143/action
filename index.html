<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Submit Job</title>
</head>
<body>

<h1>Submit Job</h1>

<form id="jobForm">
  <input type="text" id="title" placeholder="Job Title" required>
  <br><br>

  <input type="text" id="location" placeholder="Location" required>
  <br><br>

  <button type="submit">Create Issue</button>
</form>

<script>
document.getElementById("jobForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const title = document.getElementById("title").value;
  const location = document.getElementById("location").value;

  const issueTitle = encodeURIComponent("New Job");
  const issueBody = encodeURIComponent(
    `Job Title: ${title}\nLocation: ${location}`
  );

  window.location.href =
    "https://github.com/Unknowncoder143/action/issues/new?title=" +
    issueTitle +
    "&body=" +
    issueBody;
});
</script>

</body>
</html>
