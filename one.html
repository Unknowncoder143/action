<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Board</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.job{
  border:1px solid #ccc;
  border-radius:8px;
  padding:15px;
  margin:10px 0;
}

.loading{
  text-align:center;
}
</style>

</head>
<body>

<h1>Jobs Board</h1>

<div id="jobs" class="loading">
Loading jobs...
</div>

<script>

async function loadJobs() {

  try {

    const response = await fetch(
      "./data.json?t=" + Date.now()
    );

    if (!response.ok) {
      throw new Error(
        "Failed to load data.json"
      );
    }

    const jobs = await response.json();

    let html = "";

    if (!Array.isArray(jobs) ||
        jobs.length === 0) {

      html = "<p>No jobs available.</p>";

    } else {

      jobs.forEach(job => {

        html += `
          <div class="job">

            <h3>
              ${job.title || "No Title"}
            </h3>

            <p>
              <strong>Location:</strong>
              ${job.location || ""}
            </p>

            <p>
              <strong>Created:</strong>
              ${job.created || ""}
            </p>

          </div>
        `;

      });

    }

    document.getElementById("jobs")
      .innerHTML = html;

  }
  catch(error) {

    console.error(error);

    document.getElementById("jobs")
      .innerHTML =
      "<p>Unable to load data.json</p>";

  }

}

loadJobs();

setInterval(loadJobs, 5000);

</script>

</body>
</html>
