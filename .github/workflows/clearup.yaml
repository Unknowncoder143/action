name: Cleanup Data

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove entries older than 1 day
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let data = [];

            try {
              data = JSON.parse(
                fs.readFileSync('data.json', 'utf8')
              );
            } catch {}

            const now = Date.now();
            const ONE_DAY = 24 * 60 * 60 * 1000;

            data = data.filter(item => {
              if (!item.created) return false;

              return (
                now - new Date(item.created).getTime()
              ) < ONE_DAY;
            });

            fs.writeFileSync(
              'data.json',
              JSON.stringify(data, null, 2)
            );

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data.json
          git commit -m "Remove expired entries" || exit 0
          git push
