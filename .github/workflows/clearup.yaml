name: Cleanup Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove entries older than 5 minutes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let data = [];

            try {
              data = JSON.parse(fs.readFileSync('data.json', 'utf8'));
            } catch {}

            const now = Date.now();
            const FIVE_MINUTES = 5 * 60 * 1000;

            data = data.filter(item => {
              if (!item.created) return false;

              const age =
                now - new Date(item.created).getTime();

              return age < FIVE_MINUTES;
            });

            fs.writeFileSync(
              'data.json',
              JSON.stringify(data, null, 2)
            );

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data.json
          git commit -m "Cleanup old entries" || exit 0
          git push
