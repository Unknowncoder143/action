name: Issue To JSON

on:
issues:
types:
- opened

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Update data.json
    uses: actions/github-script@v7
    with:
      script: |
        const fs = require('fs');

        let data = [];

        try {
          data = JSON.parse(
            fs.readFileSync('data.json', 'utf8')
          );
        } catch (e) {
          data = [];
        }

        const body = context.payload.issue.body || '';

        const titleMatch =
          body.match(/Job Title:\s*(.*)/i);

        const locationMatch =
          body.match(/Location:\s*(.*)/i);

        data.push({
          title: titleMatch
            ? titleMatch[1].trim()
            : 'Unknown',

          location: locationMatch
            ? locationMatch[1].trim()
            : 'Unknown',

          created: new Date().toISOString()
        });

        fs.writeFileSync(
          'data.json',
          JSON.stringify(data, null, 2)
        );

  - name: Show data.json
    run: cat data.json

  - name: Commit Changes
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add data.json

      git commit -m "Update jobs" || exit 0

      git push
```

